# ==========================================================
# Uptime Kuma : 서비스 모니터링 도구
# ==========================================================
services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - 3001:3001
    volumes:
      # uptime-kuma 데이터 볼륨 마운트
      - ./data:/app/data:rw
    environment:
      # 시간대 설정
      - TZ=Asia/Seoul
    healthcheck:
      test:
        - CMD-SHELL
        - node
        - test/health-check.js
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
networks: {}