# ==========================================================
# Dockge : Docker GUI 관리 도구
# ==========================================================

services:
  dockge:
    container_name: dockge
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - 5001:5001
    volumes:
      # 도커 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock
      # dockge 데이터 볼륨 마운트
      - ./data:/app/data
      # dockge에서 관리할 스택 파일 볼륨 마운트
      - /opt/stacks:/opt/stacks
    environment:
      # dockge에서 관리할 스택 파일 경로 설정
      DOCKGE_STACKS_DIR: /opt/stacks
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5001",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=dockge"
networks: {}
